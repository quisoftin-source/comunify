version: '3.8'

services:
  web:
    build: .
    container_name: comunify-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/comunify
      - SESSION_SECRET=danish_society_secret_key
      - PORT=3000
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:6.0
    container_name: comunify-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
